<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Vinos - Cava Dinámica</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light py-5">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-9 col-lg-7">
                
                <div class="card shadow border-0 mb-5">
                    <div class="card-header bg-dark text-white py-3">
                        <h4 class="mb-0 text-center text-warning">🍷 Control de Cava de Vinos</h4>
                    </div>
                    <div class="card-body p-4">
                        <form id="wineForm" novalidate>
                            
                            <div class="mb-3 form-group-custom">
                                <label for="nombreVino" class="form-label fw-bold">Nombre del Vino / Etiqueta:</label>
                                <input type="text" id="nombreVino" name="nombreVino" class="form-control" placeholder="Ej. Casillero del Diablo Malbec">
                                <div class="invalid-feedback" id="error-nombre"></div>
                            </div>

                            <div class="mb-3 form-group-custom">
                                <label for="notaCata" class="form-label fw-bold">Nota de Cata / Descripción:</label>
                                <textarea id="notaCata" name="notaCata" class="form-control" rows="3" placeholder="Describe sus notas aromáticas, cuerpo, maridaje..."></textarea>
                                <div class="invalid-feedback" id="error-nota"></div>
                            </div>

                            <div class="mb-3 form-group-custom">
                                <label class="form-label d-block fw-bold">Tipo de Vino:</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="tipoVino" id="vinoTinto" value="Tinto">
                                    <label class="form-check-label text-danger fw-semibold" for="vinoTinto">🍷 Tinto</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="tipoVino" id="vinoBlanco" value="Blanco">
                                    <label class="form-check-label text-warning fw-semibold" for="vinoBlanco">🥂 Blanco</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="tipoVino" id="vinoRosado" value="Rosado">
                                    <label class="form-check-label fw-semibold" style="color: #e06666;" for="vinoRosado">🌸 Rosado</label>
                                </div>
                                <div class="invalid-feedback d-none" id="error-tipo"></div>
                            </div>

                            <div class="mb-3 form-group-custom">
                                <label for="bodega" class="form-label fw-bold">Región / Bodega de Origen:</label>
                                <select id="bodega" name="bodega" class="form-select">
                                    <option value="">-- Selecciona una procedencia --</option>
                                    <option value="Valle de Guadalupe (México)">Valle de Guadalupe (México)</option>
                                    <option value="Mendoza (Argentina)">Mendoza (Argentina)</option>
                                    <option value="Rioja (España)">Rioja (España)</option>
                                    <option value="Valle del Maipo (Chile)">Valle del Maipo (Chile)</option>
                                </select>
                                <div class="invalid-feedback" id="error-bodega"></div>
                            </div>

                            <div class="mb-4 form-group-custom">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="disponibilidad" name="disponibilidad">
                                    <label class="form-check-label" for="disponibilidad">
                                        Confirmo que esta botella está disponible en el inventario físico.
                                    </label>
                                    <div class="invalid-feedback" id="error-disponibilidad"></div>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-dark w-100 py-2 fw-bold shadow-sm text-warning">Agregar a la Cava</button>
                        </form>
                    </div>
                </div>

                <div class="card shadow border-0 text-dark">
                    <div class="card-header bg-secondary text-white py-3">
                        <h5 class="mb-0">📋 Inventario Actual de Vinos</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table id="wineTable" class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Etiqueta / Vino</th>
                                        <th>Tipo</th>
                                        <th>Bodega / Origen</th>
                                        <th>Nota de Cata</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr id="no-data">
                                        <td colspan="4" class="text-center text-muted py-4">No se han registrado vinos en la cava todavía.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
